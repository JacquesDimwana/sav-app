<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">

        <div class="card-header bg-primary text-white text-center">
          <h4>Créer un compte</h4>
        </div>

        <div class="card-body">

          <!-- Message d'erreur -->
          @if (errorMessage) {
            <div class="alert alert-danger p-2 small">
              {{ errorMessage }}
            </div>
          }

          <!-- Message de succès -->
          @if (successMessage) {
            <div class="alert alert-success p-2 small">
              {{ successMessage }}
            </div>
          }

          <!-- Liaison des champs au modèle "credentials" via ngModel -->
          <form (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label">Identifiant (Email)</label>
              <input
                type="text"
                name="identifier"
                class="form-control"
                [(ngModel)]="credentials.identifier"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Mot de passe</label>
              <input
                type="password"
                name="password"
                class="form-control"
                [(ngModel)]="credentials.password"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Confirmer le mot de passe</label>
              <input
                type="password"
                name="confirmPassword"
                class="form-control"
                [(ngModel)]="credentials.confirmPassword"
                required
              >
            </div>

            <button type="submit" class="btn btn-primary w-100">
              S'inscrire
            </button>

          </form>
        </div>

        <div class="card-footer text-center small">
          Déjà un compte ? <a routerLink="/login">Se connecter</a>
        </div>

      </div>
    </div>
  </div>
</div>
